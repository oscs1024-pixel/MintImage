  #         echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
  #         echo "BUILD_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
  #         echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
  #
  #     - run: flutter pub get
  #     - run: flutter build ios --release --no-codesign --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" --dart-define "APP_VERSION=$APP_VERSION"
  #
  #     - name: Archive iOS build
  #       run: |
  #         cd build/ios/iphoneos
  #         zip -r ../../../MintImage-ios-nosign.zip Runner.app
  #
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: ios-ipa
  #         path: MintImage-ios-nosign.zip

  release:
    needs: [build-windows, build-android, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            MintImage-windows-x64.zip
            app-release.apk
            MintImage-macos-arm64.zip
