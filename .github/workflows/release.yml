name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare build version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          "APP_VERSION=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BUILD_NAME=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BUILD_NUMBER=${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - run: flutter pub get
      - run: flutter build windows --release --build-name $env:BUILD_NAME --build-number $env:BUILD_NUMBER --dart-define "APP_VERSION=$env:APP_VERSION"

      - name: Archive Windows build
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip ../../../../../MintImage-windows-x64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: MintImage-windows-x64.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare build version
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Restore Android signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/mint_image_release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=mint_image_release.jks
          EOF

      - run: flutter pub get
      - run: flutter build apk --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" --dart-define "APP_VERSION=$APP_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare build version
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - run: flutter pub get
      - run: flutter build macos --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" --dart-define "APP_VERSION=$APP_VERSION"

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../MintImage-macos-arm64.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: MintImage-macos-arm64.zip

  # iOS packaging is temporarily disabled.
  # build-ios:
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - uses: subosito/flutter-action@v2
  #       with:
